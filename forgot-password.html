<!DOCTYPE html>
<html lang="en" data-theme="sakura" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auth - Forgot Password</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo/ns-logo.png">
</head>
<body>
    
    <!-- Background Elements -->
    <div class="bg-shapes">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="noise-overlay"></div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Theme Selector -->
    <div class="theme-selector">
        <button class="theme-btn active" data-set-theme="sakura" title="Sakura Pink"></button>
        <button class="theme-btn" data-set-theme="minimal" title="Minimal White"></button>
        <button class="theme-btn" data-set-theme="rosegold" title="Rose Gold"></button>
        <button class="theme-btn" data-set-theme="lavender" title="Lavender"></button>
        <button class="theme-btn" data-set-theme="midnightpink" title="Midnight Pink"></button>
        <div style="width:1px; background:var(--border); margin:0 5px;"></div>
        <button class="mode-toggle" id="mode-toggle" title="Toggle Dark/Light Mode">
            <i class="ph ph-moon"></i>
        </button>
    </div>

    <!-- Main Wrapper -->
    <div class="auth-wrapper animate-fade-in">
        
        <!-- Left Side: Illustration -->
        <div class="auth-left">
            <div class="illustration-wrapper">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/175.svg" alt="Illustration" class="illustration-img" style="filter: hue-rotate(300deg) saturate(1.8) drop-shadow(0 20px 30px rgba(236,72,153, 0.15)); max-width: 350px;">
                <h2 class="text-gradient">Forgot Password?</h2>
                <p>Don't worry, it happens to the best of us. We'll help you get back in.</p>
            </div>
        </div>
        
        <!-- Right Side: Auth Form -->
        <div class="auth-right">
            <div class="auth-card delay-100">
                <a href="index.html" class="d-inline-flex align-items-center mb-4" style="color: var(--text-secondary); font-size: 0.95rem; text-decoration: none;">
                    <i class="ph-bold ph-arrow-left me-2"></i> Back to login
                </a>
                
                <div class="auth-header text-start mb-4">
                    <h1 class="auth-title">Reset Password</h1>
                    <p class="auth-subtitle">Enter the email associated with your account and we'll send an email with instructions to reset your password.</p>
                </div>
                
                <form id="forgotForm" onsubmit="event.preventDefault(); window.setButtonLoading('resetBtn', true); setTimeout(() => { window.showToast('Reset link sent to your email!', 'success'); window.setButtonLoading('resetBtn', false); setTimeout(()=>window.location.href='reset-password.html', 1500); }, 2000);">
                    
                    <div class="form-floating mb-4">
                        <input type="email" class="form-control" id="resetEmail" placeholder="name@example.com" required>
                        <label for="resetEmail">Email address</label>
                        <i class="ph ph-envelope-simple input-icon"></i>
                    </div>
                    
                    <button type="submit" class="btn btn-primary-gradient" id="resetBtn">
                        Send Reset Link <i class="ph-bold ph-paper-plane-tilt"></i>
                    </button>
                    
                </form>
                
            </div>
        </div>
        
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
