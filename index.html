<!DOCTYPE html>
<html lang="en" data-theme="sakura" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auth - Login</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo/ns-logo.png">
</head>
<body>
    
    <!-- Background Elements -->
    <div class="bg-shapes">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="noise-overlay"></div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Theme Selector -->
    <div class="theme-selector">
        <button class="theme-btn active" data-set-theme="sakura" title="Sakura Pink"></button>
        <button class="theme-btn" data-set-theme="minimal" title="Minimal White"></button>
        <button class="theme-btn" data-set-theme="rosegold" title="Rose Gold"></button>
        <button class="theme-btn" data-set-theme="lavender" title="Lavender"></button>
        <button class="theme-btn" data-set-theme="midnightpink" title="Midnight Pink"></button>
        <div style="width:1px; background:var(--border); margin:0 5px;"></div>
        <button class="mode-toggle" id="mode-toggle" title="Toggle Dark/Light Mode">
            <i class="ph ph-moon"></i>
        </button>
    </div>

    <!-- Main Wrapper -->
    <div class="auth-wrapper animate-fade-in">
        
        <!-- Left Side: Illustration -->
        <div class="auth-left">
            <div class="illustration-wrapper">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/151.svg" alt="Illustration" class="illustration-img" style="filter: hue-rotate(280deg) saturate(2) drop-shadow(0 20px 30px rgba(236,72,153, 0.15));">
                <h2 class="text-gradient">Welcome to Premium Auth</h2>
                <p>The most elegant and luxurious authentication UI kit for your next big project.</p>
            </div>
        </div>
        
        <!-- Right Side: Auth Form -->
        <div class="auth-right">
            <div class="auth-card delay-100">
                <div class="auth-header">
                    <div class="auth-logo">
                        <img src="assets/images/logo/ns-logo.png" alt="NS Logo" style="width: 100%; height: 100%; object-fit: cover; transform: scale(1.4);">
                    </div>
                    <h1 class="auth-title">Welcome Back <span style="display:inline-block; animation: wave 2s infinite transform-origin: 70% 70%;">👋</span></h1>
                    <p class="auth-subtitle">Please enter your details to sign in.</p>
                </div>
                
                <form id="loginForm" onsubmit="event.preventDefault(); window.setButtonLoading('loginBtn', true); setTimeout(() => { window.showToast('Successfully logged in!', 'success'); window.setButtonLoading('loginBtn', false); setTimeout(()=>window.location.href='success.html', 1500); }, 1500);">
                    
                    <div class="form-floating">
                        <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
                        <label for="loginEmail">Email address</label>
                        <i class="ph ph-envelope-simple input-icon"></i>
                    </div>
                    
                    <div class="form-floating">
                        <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
                        <label for="loginPassword">Password</label>
                        <i class="ph ph-lock-key input-icon"></i>
                        <button type="button" class="password-toggle" data-target="loginPassword">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check custom-checkbox">
                            <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">
                                Remember me
                            </label>
                        </div>
                        <a href="forgot-password.html" class="fw-medium" style="font-size: 0.95rem;">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary-gradient" id="loginBtn">
                        Sign In <i class="ph-bold ph-arrow-right"></i>
                    </button>
                    
                </form>
                
                <div class="auth-divider">Or continue with</div>
                
                <div class="social-login">
                    <button type="button" class="btn btn-social">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google">
                        Google
                    </button>
                    <button type="button" class="btn btn-social">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" alt="GitHub">
                        GitHub
                    </button>
                    <button type="button" class="btn btn-social">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/apple/apple-original.svg" style="filter: brightness(0) invert(var(--bs-dark-mode-invert, 0));" alt="Apple">
                        Apple
                    </button>
                </div>
                
                <p class="text-center mt-4 mb-0" style="color: var(--text-secondary); font-size: 0.95rem;">
                    Don't have an account? <a href="signup.html" class="fw-bold" style="color: var(--primary);">Sign up</a>
                </p>
                
            </div>
        </div>
        
    </div>

    <style>
        @keyframes wave {
            0% { transform: rotate( 0.0deg) }
            10% { transform: rotate(14.0deg) }  
            20% { transform: rotate(-8.0deg) }
            30% { transform: rotate(14.0deg) }
            40% { transform: rotate(-4.0deg) }
            50% { transform: rotate(10.0deg) }
            60% { transform: rotate( 0.0deg) }
            100% { transform: rotate( 0.0deg) }
        }
        
        /* Quick fix for Apple icon in dark mode */
        html[data-bs-theme="dark"] {
            --bs-dark-mode-invert: 1;
        }
        html[data-bs-theme="light"] {
            --bs-dark-mode-invert: 0;
        }
    </style>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/password.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
