<!DOCTYPE html>
<html lang="en" data-theme="sakura" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auth - OTP Verification</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo/ns-logo.png">
</head>
<body>
    
    <!-- Background Elements -->
    <div class="bg-shapes">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="noise-overlay"></div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Theme Selector -->
    <div class="theme-selector">
        <button class="theme-btn active" data-set-theme="sakura" title="Sakura Pink"></button>
        <button class="theme-btn" data-set-theme="minimal" title="Minimal White"></button>
        <button class="theme-btn" data-set-theme="rosegold" title="Rose Gold"></button>
        <button class="theme-btn" data-set-theme="lavender" title="Lavender"></button>
        <button class="theme-btn" data-set-theme="midnightpink" title="Midnight Pink"></button>
        <div style="width:1px; background:var(--border); margin:0 5px;"></div>
        <button class="mode-toggle" id="mode-toggle" title="Toggle Dark/Light Mode">
            <i class="ph ph-moon"></i>
        </button>
    </div>

    <!-- Main Wrapper -->
    <div class="auth-wrapper animate-fade-in">
        
        <!-- Left Side: Illustration -->
        <div class="auth-left">
            <div class="illustration-wrapper">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/176.svg" alt="Illustration" class="illustration-img" style="filter: hue-rotate(290deg) saturate(1.8) drop-shadow(0 20px 30px rgba(236,72,153, 0.15)); max-width: 350px;">
                <h2 class="text-gradient">Verify Your Identity</h2>
                <p>We've sent a one-time password to your email to verify your account.</p>
            </div>
        </div>
        
        <!-- Right Side: Auth Form -->
        <div class="auth-right">
            <div class="auth-card delay-100 text-center">
                <div class="auth-header mb-4">
                    <div class="auth-logo mx-auto">
                        <img src="assets/images/logo/ns-logo.png" alt="NS Logo" style="width: 100%; height: 100%; object-fit: cover; transform: scale(1.4);">
                    </div>
                    <h1 class="auth-title">Enter OTP</h1>
                    <p class="auth-subtitle">We sent a 6-digit code to <strong>hello@example.com</strong></p>
                </div>
                
                <form id="otpForm" onsubmit="event.preventDefault(); window.setButtonLoading('verifyBtn', true); setTimeout(() => { window.showToast('Verification successful!', 'success'); window.setButtonLoading('verifyBtn', false); setTimeout(()=>window.location.href='success.html', 1500); }, 2000);">
                    
                    <div class="otp-container">
                        <input type="text" class="otp-input" maxlength="1" required autofocus>
                        <input type="text" class="otp-input" maxlength="1" required>
                        <input type="text" class="otp-input" maxlength="1" required>
                        <input type="text" class="otp-input" maxlength="1" required>
                        <input type="text" class="otp-input" maxlength="1" required>
                        <input type="text" class="otp-input" maxlength="1" required>
                    </div>
                    
                    <div class="mb-4">
                        <span style="color: var(--text-secondary); font-size: 0.95rem;">Code expires in <strong id="timer" style="color: var(--primary);">02:59</strong></span>
                    </div>
                    
                    <button type="submit" class="btn btn-primary-gradient mb-3" id="verifyBtn">
                        Verify Code <i class="ph-bold ph-shield-check"></i>
                    </button>
                    
                    <p style="color: var(--text-secondary); font-size: 0.95rem;">
                        Didn't receive the code? 
                        <a href="#" class="fw-bold" style="color: var(--primary);" onclick="event.preventDefault(); window.showToast('New code sent!', 'success'); resetTimer();">Resend</a>
                    </p>
                    
                </form>
                
            </div>
        </div>
        
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Simple Countdown Timer
        let timeLeft = 179;
        const timerEl = document.getElementById('timer');
        let timerInterval;
        
        function updateTimer() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            timerEl.textContent = `${m}:${s}`;
            if(timeLeft > 0) timeLeft--;
            else clearInterval(timerInterval);
        }
        
        function resetTimer() {
            clearInterval(timerInterval);
            timeLeft = 179;
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        resetTimer();
    </script>
</body>
</html>
