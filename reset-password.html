<!DOCTYPE html>
<html lang="en" data-theme="sakura" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auth - Reset Password</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo/ns-logo.png">
</head>
<body>
    
    <!-- Background Elements -->
    <div class="bg-shapes">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="noise-overlay"></div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Theme Selector -->
    <div class="theme-selector">
        <button class="theme-btn active" data-set-theme="sakura" title="Sakura Pink"></button>
        <button class="theme-btn" data-set-theme="minimal" title="Minimal White"></button>
        <button class="theme-btn" data-set-theme="rosegold" title="Rose Gold"></button>
        <button class="theme-btn" data-set-theme="lavender" title="Lavender"></button>
        <button class="theme-btn" data-set-theme="midnightpink" title="Midnight Pink"></button>
        <div style="width:1px; background:var(--border); margin:0 5px;"></div>
        <button class="mode-toggle" id="mode-toggle" title="Toggle Dark/Light Mode">
            <i class="ph ph-moon"></i>
        </button>
    </div>

    <!-- Main Wrapper -->
    <div class="auth-wrapper animate-fade-in">
        
        <!-- Left Side: Illustration -->
        <div class="auth-left">
            <div class="illustration-wrapper">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/133.svg" alt="Illustration" class="illustration-img" style="filter: hue-rotate(330deg) saturate(1.8) drop-shadow(0 20px 30px rgba(236,72,153, 0.15)); max-width: 350px;">
                <h2 class="text-gradient">Secure Your Account</h2>
                <p>Choose a strong password to keep your account safe.</p>
            </div>
        </div>
        
        <!-- Right Side: Auth Form -->
        <div class="auth-right">
            <div class="auth-card delay-100">
                <div class="auth-header mb-4">
                    <div class="auth-logo">
                        <img src="assets/images/logo/ns-logo.png" alt="NS Logo" style="width: 100%; height: 100%; object-fit: cover; transform: scale(1.4);">
                    </div>
                    <h1 class="auth-title">Create New Password</h1>
                    <p class="auth-subtitle">Your new password must be different from previous used passwords.</p>
                </div>
                
                <form id="newPasswordForm" onsubmit="event.preventDefault(); window.setButtonLoading('saveBtn', true); setTimeout(() => { window.showToast('Password reset successfully!', 'success'); window.setButtonLoading('saveBtn', false); setTimeout(()=>window.location.href='index.html', 1500); }, 2000);">
                    
                    <div class="form-floating mb-2">
                        <!-- ID matches what's used in password.js for the strength meter -->
                        <input type="password" class="form-control" id="signupPassword" placeholder="New Password" required>
                        <label for="signupPassword">New Password</label>
                        <i class="ph ph-lock-key input-icon"></i>
                        <button type="button" class="password-toggle" data-target="signupPassword">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                    
                    <!-- Password Strength Meter -->
                    <div class="password-strength">
                        <div class="strength-bars">
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span style="font-size: 0.85rem; color: var(--text-secondary);">Password Strength</span>
                            <span class="strength-text">Very Weak</span>
                        </div>
                        <ul class="strength-reqs" style="display:none;">
                            <li id="req-length"></li>
                            <li id="req-upper"></li>
                            <li id="req-lower"></li>
                            <li id="req-number"></li>
                            <li id="req-special"></li>
                        </ul>
                    </div>
                    
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="confirmNewPassword" placeholder="Confirm Password" required>
                        <label for="confirmNewPassword">Confirm Password</label>
                        <i class="ph ph-lock-key-fill input-icon"></i>
                        <button type="button" class="password-toggle" data-target="confirmNewPassword">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                    
                    <button type="submit" class="btn btn-primary-gradient" id="saveBtn">
                        Reset Password <i class="ph-bold ph-check"></i>
                    </button>
                    
                </form>
                
            </div>
        </div>
        
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/password.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
