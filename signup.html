<!DOCTYPE html>
<html lang="en" data-theme="sakura" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auth - Sign Up</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo/ns-logo.png">
</head>
<body>
    
    <!-- Background Elements -->
    <div class="bg-shapes">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="noise-overlay"></div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Theme Selector -->
    <div class="theme-selector">
        <button class="theme-btn active" data-set-theme="sakura" title="Sakura Pink"></button>
        <button class="theme-btn" data-set-theme="minimal" title="Minimal White"></button>
        <button class="theme-btn" data-set-theme="rosegold" title="Rose Gold"></button>
        <button class="theme-btn" data-set-theme="lavender" title="Lavender"></button>
        <button class="theme-btn" data-set-theme="midnightpink" title="Midnight Pink"></button>
        <div style="width:1px; background:var(--border); margin:0 5px;"></div>
        <button class="mode-toggle" id="mode-toggle" title="Toggle Dark/Light Mode">
            <i class="ph ph-moon"></i>
        </button>
    </div>

    <!-- Main Wrapper -->
    <div class="auth-wrapper animate-fade-in">
        
        <!-- Left Side: Illustration -->
        <div class="auth-left">
            <div class="illustration-wrapper">
                <!-- Using another open source illustration (Pokemon placeholder styled abstractly) -->
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/148.svg" alt="Illustration" class="illustration-img" style="filter: hue-rotate(320deg) saturate(1.5) drop-shadow(0 20px 30px rgba(236,72,153, 0.15)); max-width: 400px;">
                <h2 class="text-gradient">Join the Community</h2>
                <p>Create an account to start your luxurious journey with our premium tools.</p>
            </div>
        </div>
        
        <!-- Right Side: Auth Form -->
        <div class="auth-right">
            <div class="auth-card delay-100" style="max-width: 520px;">
                <div class="auth-header mb-4">
                    <div class="auth-logo">
                        <img src="assets/images/logo/ns-logo.png" alt="NS Logo" style="width: 100%; height: 100%; object-fit: cover; transform: scale(1.4);">
                    </div>
                    <h1 class="auth-title">Create Account</h1>
                    <p class="auth-subtitle">Get started for free today.</p>
                </div>
                
                <form id="signupForm" onsubmit="event.preventDefault(); window.setButtonLoading('signupBtn', true); setTimeout(() => { window.showToast('Account created successfully!', 'success'); window.setButtonLoading('signupBtn', false); setTimeout(()=>window.location.href='otp.html', 1500); }, 2000);">
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="fullName" placeholder="John Doe" required>
                                <label for="fullName">Full Name</label>
                                <i class="ph ph-user input-icon"></i>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="userName" placeholder="johndoe123" required>
                                <label for="userName">Username</label>
                                <i class="ph ph-at input-icon"></i>
                            </div>
                        </div>
                    </div>

                    <div class="form-floating">
                        <input type="email" class="form-control" id="signupEmail" placeholder="name@example.com" required>
                        <label for="signupEmail">Email address</label>
                        <i class="ph ph-envelope-simple input-icon"></i>
                    </div>
                    
                    <div class="form-floating mb-2">
                        <input type="password" class="form-control" id="signupPassword" placeholder="Password" required>
                        <label for="signupPassword">Password</label>
                        <i class="ph ph-lock-key input-icon"></i>
                        <button type="button" class="password-toggle" data-target="signupPassword">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                    
                    <!-- Password Strength Meter -->
                    <div class="password-strength">
                        <div class="strength-bars">
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span style="font-size: 0.85rem; color: var(--text-secondary);">Password Strength</span>
                            <span class="strength-text">Very Weak</span>
                        </div>
                        <ul class="strength-reqs">
                            <li id="req-length"><i class="ph ph-circle"></i> 8+ characters</li>
                            <li id="req-upper"><i class="ph ph-circle"></i> Uppercase</li>
                            <li id="req-lower"><i class="ph ph-circle"></i> Lowercase</li>
                            <li id="req-number"><i class="ph ph-circle"></i> Number</li>
                            <li id="req-special"><i class="ph ph-circle"></i> Special char</li>
                        </ul>
                    </div>
                    
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
                        <label for="confirmPassword">Confirm Password</label>
                        <i class="ph ph-lock-key-fill input-icon"></i>
                    </div>
                    
                    <div class="form-check custom-checkbox mb-4">
                        <input class="form-check-input" type="checkbox" value="" id="acceptTerms" required>
                        <label class="form-check-label" for="acceptTerms">
                            I accept the <a href="#" class="fw-medium">Terms of Service</a> and <a href="#" class="fw-medium">Privacy Policy</a>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary-gradient" id="signupBtn">
                        Create Account <i class="ph-bold ph-arrow-right"></i>
                    </button>
                    
                </form>
                
                <p class="text-center mt-4 mb-0" style="color: var(--text-secondary); font-size: 0.95rem;">
                    Already have an account? <a href="index.html" class="fw-bold" style="color: var(--primary);">Sign in</a>
                </p>
                
            </div>
        </div>
        
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/password.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
