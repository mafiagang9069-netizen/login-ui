<!DOCTYPE html>
<html lang="en" data-theme="sakura" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auth - Verify Email</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo/ns-logo.png">
</head>
<body>
    
    <!-- Background Elements -->
    <div class="bg-shapes">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="noise-overlay"></div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Theme Selector -->
    <div class="theme-selector">
        <button class="theme-btn active" data-set-theme="sakura" title="Sakura Pink"></button>
        <button class="theme-btn" data-set-theme="minimal" title="Minimal White"></button>
        <button class="theme-btn" data-set-theme="rosegold" title="Rose Gold"></button>
        <button class="theme-btn" data-set-theme="lavender" title="Lavender"></button>
        <button class="theme-btn" data-set-theme="midnightpink" title="Midnight Pink"></button>
        <div style="width:1px; background:var(--border); margin:0 5px;"></div>
        <button class="mode-toggle" id="mode-toggle" title="Toggle Dark/Light Mode">
            <i class="ph ph-moon"></i>
        </button>
    </div>

    <!-- Main Wrapper -->
    <div class="auth-wrapper animate-fade-in" style="justify-content: center;">
        
        <!-- Center Box for verification (No split screen here for variety) -->
        <div class="auth-card delay-100 text-center" style="max-width: 500px; margin: 2rem;">
            <div class="auth-logo mx-auto mb-4" style="display:flex;">
                <img src="assets/images/logo/ns-logo.png" alt="NS Logo" style="width: 100%; height: 100%; object-fit: cover; transform: scale(1.4);">
            </div>
            
            <div class="mb-4" style="position: relative; display: inline-block;">
                <!-- Animated Mail Icon -->
                <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--secondary); display: flex; align-items: center; justify-content: center; margin: 0 auto;">
                    <i class="ph-fill ph-envelope-open" style="font-size: 3.5rem; color: var(--primary); animation: float 3s ease-in-out infinite;"></i>
                </div>
            </div>
            
            <h1 class="auth-title mb-3">Check your email</h1>
            
            <p style="color: var(--text-secondary); font-size: 1.05rem; margin-bottom: 2rem;">
                We've sent a verification link to<br>
                <strong style="color: var(--text-primary);">hello@example.com</strong>
            </p>
            
            <div class="d-grid gap-3">
                <button type="button" class="btn btn-primary-gradient" onclick="window.location.href='index.html'">
                    Back to Login <i class="ph-bold ph-arrow-right"></i>
                </button>
                
                <button type="button" class="btn" style="color: var(--text-secondary); font-weight: 500; transition: all 0.2s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-secondary)'" onclick="window.showToast('Verification email resent!', 'success')">
                    Resend Email
                </button>
            </div>
            
        </div>
        
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
